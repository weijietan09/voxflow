line-length = 100
target-version = "py310"
src = ["src", "tests"]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "W"]
ignore = [
    "E501",  # line length is handled by the formatter
    "B008",  # function calls in argument defaults are used deliberately
]

[lint.per-file-ignores]
"tests/*" = ["B", "SIM"]
"examples/*" = ["E402", "T201"]
"benchmarks/*" = ["T201"]

[lint.isort]
known-first-party = ["voxflow"]

[format]
quote-style = "double"
